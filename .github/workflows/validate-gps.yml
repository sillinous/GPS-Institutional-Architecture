name: Validate GPS Repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository structure
        run: |
          test -d artifacts
          test -d models
          test -d templates
          test -d governance
          echo "GPS repository structure validated"
